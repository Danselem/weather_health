name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'

jobs:
  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: infra-aws
        run: terraform init -upgrade

      - name: Terraform Plan
        working-directory: infra-aws
        run: terraform plan -var-file=environments/${{ github.event.inputs.environment }}/terraform.tfvars
        env:
          TF_VAR_container_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/weather-health:${{ github.event.inputs.image_tag }}

      - name: Terraform Apply
        if: github.event.inputs.environment == 'dev'
        working-directory: infra-aws
        run: terraform apply -var-file=environments/${{ github.event.inputs.environment }}/terraform.tfvars -auto-approve
        env:
          TF_VAR_container_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/weather-health:${{ github.event.inputs.image_tag }}

      - name: Terraform Apply (Manual for staging/prod)
        if: github.event.inputs.environment != 'dev'
        run: echo "Manual approval required for ${{ github.event.inputs.environment }}"

  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.environment == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS Service
        env:
          AWS_REGION: us-east-1
          ECS_CLUSTER: weather-health-cluster-${{ github.event.inputs.environment }}
          ECS_SERVICE: weather-health-service-${{ github.event.inputs.environment }}
          IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/weather-health:${{ github.event.inputs.image_tag }}
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Get Service URL
        run: |
          echo "Service deployed!"