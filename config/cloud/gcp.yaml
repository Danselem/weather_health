# =============================================================================
# GCP (Google Cloud Platform) Cloud Configuration
# =============================================================================
# Use with: python train.py cloud=gcp
# =============================================================================

cloud:
  provider: gcp
  project_id: ${oc.env:GCP_PROJECT_ID,weather-health}
  region: ${oc.env:GCP_REGION,us-central1}
  zone: ${oc.env:GCP_ZONE,us-central1a}

# =============================================================================
# Artifact Registry
# =============================================================================
artifact_registry:
  repository_name: weather-health
  location: us-central1
  format: docker
  description: Container registry for weather-health images
  immutable_tags: false

# =============================================================================
# Cloud Run Configuration
# =============================================================================
cloudrun:
  service_name: weather-health
  location: us-central1
  
  # Container configuration
  container:
    image: us-central1-docker.pkg.dev/${oc.env:GCP_PROJECT_ID,weather-health}/weather-health:latest
    port: 8080
    cpu: 1
    memory: 2Gi
    command: []
    args: []
    env: []
    env_secret: []
  
  # Scaling configuration
  scaling:
    min_instances: 0
    max_instances: 10
    concurrency: 80
    timeout: 300
  
  # Traffic routing
  traffic:
    latest_revision: 100  # percent
  
  # VPC configuration (optional)
  vpc_connector: null
  vpc_egress: none

# =============================================================================
# Cloud Functions (Gen 2)
# =============================================================================
cloudfunctions:
  function_name: weather-health-predict
  runtime: python310
  entry_point: handler
  
  # Configuration
  memory: 256MB
  timeout: 60
  max_instances: 10
  min_instances: 0
  
  # Trigger - HTTP
  trigger:
    type: http
    auth_level: require_authentication
  
  # Environment variables
  env_vars:
    FUNCTION_NAME: weather-health-predict

# =============================================================================
# GCS (Google Cloud Storage) Configuration
# =============================================================================
gcs:
  artifact_bucket: weather-health-artifacts
  model_path: models/
  data_path: data/
  
  # Bucket configuration
  location: US-CENTRAL1
  storage_class: STANDARD
  versioning: true
  uniform_bucket_level_access: true

# =============================================================================
# Vertex AI (Optional - for managed ML)
# =============================================================================
vertex_ai:
  enabled: false
  endpoint_name: weather-health-endpoint
  machine_type: n1-standard-4
  accelerator_type: null
  accelerator_count: null

# =============================================================================
# Secret Manager
# =============================================================================
secret_manager:
  enabled: true
  secrets:
    mlflow_tracking_uri:
      secret_id: mlflow-tracking-uri
      version: latest
    database_password:
      secret_id: database-password
      version: latest