# =============================================================================
# LightGBM Model Configuration
# =============================================================================
# Use with: python train.py model=lightgbm
# =============================================================================

model:
  name: lightgbm
  description: LightGBM gradient boosting classifier

hyperopt:
  n_trials: 50
  timeout: 900  # 15 minutes max

search_space:
  n_estimators:
    type: choice
    values:
      - 50
      - 100
      - 200
      - 300
  learning_rate:
    type: uniform
    low: 0.01
    high: 0.3
  max_depth:
    type: choice
    values:
      - -1
      - 3
      - 5
      - 7
      - 10
  num_leaves:
    type: choice
    values:
      - 15
      - 31
      - 63
      - 127
  min_child_samples:
    type: choice
    values:
      - 5
      - 10
      - 20
  subsample:
    type: uniform
    low: 0.7
    high: 1.0
  colsample_bytree:
    type: uniform
    low: 0.7
    high: 1.0
  reg_alpha:
    type: loguniform
    low: 0.001
    high: 10.0
  reg_lambda:
    type: loguniform
    low: 0.001
    high: 10.0

lgbm_params:
  random_state: 1024
  objective: multiclass
  num_class: 20
  metric: multi_logloss
  boosting_type: gbdt
  verbosity: -1
  force_col_wise: true

preprocessing:
  scaler: minmax
  encoder: label